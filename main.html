<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CEC IT PROCTOR ANSWER</title>
   <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet">
   <style>
      * {
         padding: 0;
         margin: 0;
         box-sizing: border-box;
         scrollbar-width: none;
         overflow-x: hidden;
         -webkit-tap-highlight-color: transparent;
         font-family: 'Poppins', sans-serif;
      }

      body {
         background: #000;
         color: #fff;
      }

      section {
         width: 100vw;
         height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         background: rgba(0, 0, 0, 0.88);
         padding: 18px;
      }

      /* Background */
      .bg {
         background-image: url('https://scontent.fceb2-2.fna.fbcdn.net/v/t39.30808-6/467686990_1101615251635433_9079035779926262456_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=cc71e4&_nc_eui2=AeE8VBJG10wGbzb_t_REBCjS2_9Tnh4f96_b_1OeHh_3r9GJWO9vyCmpt3KL0xg8_eALaT-ERjGr4zCQm99RfOuw&_nc_ohc=0h7gIkdd6x4Q7kNvwEUzX_6&_nc_oc=AdkGc8HJXA5WEzPzteagHB9guf63E4EmzosrtoIaIznRu5VahJv7-VwIp70zVWISw40&_nc_zt=23&_nc_ht=scontent.fceb2-2.fna&_nc_gid=hdE5HDJTh5QVMbNW_loYVA&oh=00_AfeuUj9QlfEjbrLVh9kYC_5La_ZjMpy02XAZ6HVnB0ksUw&oe=68FE6F4E');
         background-position: center;
         background-repeat: no-repeat;
         background-size: cover;
         min-height: 100vh;
      }

      /* Main container */
      .cont {
         width: min(980px, 96vw);
         height: 90vh;
         background: rgba(255, 255, 255, 0.06);
         border: 1px solid rgba(255, 255, 255, 0.14);
         border-radius: 18px;
         padding: 18px;
         backdrop-filter: blur(10px);
         -webkit-backdrop-filter: blur(10px);
         box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
         display: flex;
         flex-wrap: wrap;
         flex-direction: row;
         gap: 12px;

      }

      input {
         outline: 0;
         border-radius: 12px;
      }

      /* Search */
      #search {
         width: 100%;
         /* max-width: 720px; */
         font-size: 16px;
         padding: 12px 14px;
         border: 1px solid rgba(20, 255, 210, 0.55);
         background: rgba(0, 0, 0, 0.25);
         color: #fff;
         box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      #search::placeholder {
         color: rgba(255, 255, 255, 0.65);
      }

      /* Scan panel */
      .cdat {
         position: relative;
         z-index: 1000;
         display: none;
         width: 100%;
         background: rgba(0, 0, 0, 0.35);
         border: 1px solid rgba(255, 255, 255, 0.14);
         border-radius: 16px;
         overflow: hidden;
         align-items: center;
         justify-content: center;
         text-align: center;

      }

      #label {
         color: #11c7b3;
         padding: 10px 18px;
         background: rgba(255, 255, 255, 0.92);
         font-weight: 800;
         letter-spacing: 0.3px;
         text-align: left;
         font-size: 15px;
      }

      #video {
         width: 100%;
         max-width: 520px;
         border-radius: 14px;
         margin: 14px;
         background: #000;
         box-shadow: 0 18px 50px rgba(0, 0, 0, 0.6);
      }

      #canvas {
         display: none;
         border-radius: 14px;
         margin: 14px;
      }

      /* Output */
      #output {
         width: 100%;
         height: auto;
         max-height: none;
         font-size: 15px;
         color: #0b0b0b;
         position: static;
         transform: none;
         background-color: rgba(255, 255, 255, 0.95);
         font-family: 'Poppins', sans-serif;
         border-radius: 14px;
         padding: 12px 18px;
         z-index: 10;
         text-align: center;
         border: 1px solid rgba(0, 255, 200, 0.35);
         box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
         margin: 10px 0 0 0;
         overflow: visible;
      }



      #result {
         margin-top: 28px;
         color: #12b886;
         font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
         font-size: 14px;
         line-height: 1.4;
         padding: 0 6px;
         white-space: normal;
      }

      .tcont {
         height: 50vh;
         display: flex;
         flex-direction: column;
         flex-grow: 2;
         position: relative;
         align-items: center;
         justify-content: center;

      }

      /* Floating Camera Button */
      #openCameraBtn {
         overflow: hidden;
         border-radius: 999px;
         width: 86px;
         height: 86px;
         position: absolute;
         bottom: 56px;
         right: 56px;
         background: transparent;
         border: none;
         /* background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(255,255,255,0) 55%), #11c7b3;
            box-shadow: 0 18px 50px rgba(0, 200, 180, 0.28), 0 12px 28px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.18);
            cursor: pointer; */
         transition: transform 0.15s ease, box-shadow 0.15s ease;
         /* display: none; */
      }

      /* #openCameraBtn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 24px 70px rgba(0, 200, 180, 0.35), 0 12px 34px rgba(0, 0, 0, 0.46);
        } */
      /* 
        #openCameraBtn:active {
            transform: translateY(0px) scale(0.99);
        } */

      /* Responsive adjustments */
      @media (max-width: 520px) {
         #output {
            top: 50vh;
            font-size: 13px;
         }

         #openCameraBtn {
            width: 76px;
            height: 76px;
            bottom: 44px;
            right: 22px;
         }
      }

      /* From Uiverse.io by Chrisllan02 */
      .glass-icon {
         display: inline-block;
         width: 50px;
         height: 50px;
         filter: grayscale(100%) opacity(0.6) brightness(3) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));

         transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
         cursor: pointer;
      }

      .glass-icon:hover {
         transform: translateY(-8px) scale(1.05);
         filter: grayscale(0%) opacity(1) brightness(1) drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
      }
   </style>
</head>

<body>

   <div class="bg">

      <section id="sec">

         <div class="cont">

            <input type="text" id="search" style="margin: 10px 0; padding: 5px 10px; max-height: 10%;"
               placeholder="Enter at least two words of the question."></input>

            <div class="cdat" id="cdat">
               <h2 id="label" style="display: none;">Scan the Questions</h2>

               <video id="video" autoplay playsinline width="400" style="border-radius: 15px;"></video>
               <canvas id="canvas" style="display:none; border-radius: 15px;"></canvas>

            </div>

            <div class="tcont">
               <p id="output">Answer shows here...<br>(If you will use camera, focus the cam and touch the screen to
                  answer)</p>

               <p id="result"></p>
            </div>

         </div>
      </section>
   </div>


   <!-- floatingadd burron below right side -->
   <button id="openCameraBtn" style="color: white; font-size: 30px; font-weight: bold;" onclick=""
      aria-label="Use Camera">
      <!-- From Uiverse.io by Chrisllan02 -->
      <svg viewBox="0 0 256 256" class="glass-icon" xmlns="http://www.w3.org/2000/svg">
         <defs>
            <linearGradient id="mTop" x1="0" y1="0" x2="1" y2="0">
               <stop offset="0" stop-color="#ea4335"></stop>
               <stop offset="1" stop-color="#fbbc04"></stop>
            </linearGradient>
            <linearGradient id="mRight" x1="0" y1="0" x2="0" y2="1">
               <stop offset="0" stop-color="#fbbc04"></stop>
               <stop offset="1" stop-color="#34a853"></stop>
            </linearGradient>
            <linearGradient id="mBottom" x1="1" y1="0" x2="0" y2="0">
               <stop offset="0" stop-color="#34a853"></stop>
               <stop offset="1" stop-color="#4285f4"></stop>
            </linearGradient>
            <linearGradient id="mLeft" x1="0" y1="1" x2="0" y2="0">
               <stop offset="0" stop-color="#4285f4"></stop>
               <stop offset="1" stop-color="#ea4335"></stop>
            </linearGradient>
         </defs>
         <path d="M 64 60 L 166 60 A 24 24 0 0 1 190 84" stroke="url(#mTop)" stroke-width="20" stroke-linecap="round"
            fill="none" filter="drop-shadow(0 0 6px rgba(234,67,53,0.4))"></path>
         <path d="M 190 84 V 100 L 240 70 V 186 L 190 156 V 172 A 24 24 0 0 1 166 196" stroke="url(#mRight)"
            stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"
            filter="drop-shadow(0 0 6px rgba(52,168,83,0.4))"></path>
         <path d="M 166 196 L 64 196 A 24 24 0 0 1 40 172" stroke="url(#mBottom)" stroke-width="20"
            stroke-linecap="round" fill="none" filter="drop-shadow(0 0 6px rgba(66,133,244,0.4))"></path>
         <path d="M 40 172 L 40 84 A 24 24 0 0 1 64 60" stroke="url(#mLeft)" stroke-width="20" stroke-linecap="round"
            fill="none" filter="drop-shadow(0 0 6px rgba(66,133,244,0.4))"></path>
      </svg>

   </button>


</body>
<script src="script.js" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="scanner.js"></script>


</html>
