<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEC IT PROCTOR ANSWER</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * {
                padding: 0;
                margin: 0;
                box-sizing: border-box;
                scrollbar-width: none;
                overflow-x: hidden;
                font-family: 'Poppins', sans-serif;
        }

        body {
            background: #000;
            color: #fff;
        }

        section {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.78);
            padding: 18px;
        }

        /* Background image wrapper */
        .bg {
            background-image: url('https://scontent.fceb2-2.fna.fbcdn.net/v/t39.30808-6/467686990_1101615251635433_9079035779926262456_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=cc71e4&_nc_eui2=AeE8VBJG10wGbzb_t_REBCjS2_9Tnh4f96_b_1OeHh_3r9GJWO9vyCmpt3KL0xg8_eALaT-ERjGr4zCQm99RfOuw&_nc_ohc=0h7gIkdd6x4Q7kNvwEUzX_6&_nc_oc=AdkGc8HJXA5WEzPzteagHB9guf63E4EmzosrtoIaIznRu5VahJv7-VwIp70zVWISw40&_nc_zt=23&_nc_ht=scontent.fceb2-2.fna&_nc_gid=hdE5HDJTh5QVMbNW_loYVA&oh=00_AfeuUj9QlfEjbrLVh9kYC_5La_ZjMpy02XAZ6HVnB0ksUw&oe=68FE6F4E');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        /* Card */
        div {
            width: min(520px, 92vw);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            margin: auto;
            padding: 28px 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
            position: relative;
        }

        div:before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(0, 255, 200, 0.35), rgba(0, 125, 255, 0.18), rgba(255,255,255,0.06));
            z-index: -1;
            filter: blur(10px);
            opacity: 0.7;
        }

        h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.2px;
            margin-bottom: 14px;
            text-align: center;
        }

        input {
            width: 100%;
            max-width: 360px;
            padding: 12px 14px;
            outline: 0;
            border-radius: 12px;
            border: 1px solid rgba(20, 255, 210, 0.55);
            background: rgba(0,0,0,0.35);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        input::placeholder {
            color: rgba(255,255,255,0.65);
        }

        button {
            width: 100%;
            max-width: 360px;
            margin-top: 16px;
            padding-top: 12px;
            padding-bottom: 12px;
            background: linear-gradient(90deg, #11c7b3, #14a2ff);
            text-decoration: none;
            color: white;
            border-radius: 12px;
            outline: 0;
            border: none;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 0.2px;
            box-shadow: 0 14px 34px rgba(0, 180, 160, 0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 44px rgba(0, 180, 160, 0.32);
        }

        button:active {
            transform: translateY(0px);
        }
    </style>
</head>
<body>
   <section class="bg">

      <section id="sec">
         <div>
            <h2 >Enter Exam Code</h2><br>
            <input type="text" name="code" id="codetext" placeholder="Enter exam Code" required>
            <button id="btn">Continue</button>
         </div>
      </section> 
   </section>
      
      <script>

         const xxx = "https://script.google.com/macros/s/AKfycbxw4dITKgZHApGwPWdciAWvMMofoT6-jwyqwQK-GPZLQxS23jQxEyWhGk53_58LHKcWIQ/exec";
let a = '?action=getAllQuestionsAndAnswers&code=';

         document.getElementById('btn').addEventListener('click', function(){
            if(document.getElementById('codetext').value.length > 0){
               document.getElementById('btn').style.display = 'none'

            localStorage.setItem('code', document.getElementById('codetext').value)

            const xx = `${xxx}${a}${encodeURIComponent(document.getElementById('codetext').value.toUpperCase())}`;
  
  try {
    fetch(xx).then(response => response.json()).then(data => {
          localStorage.setItem('data', JSON.stringify(data));
          //alert(localStorage.getItem('data'))
          window.location = 'main.html'
    }).then(error =>{
      console.log(error)
       document.getElementById('btn').style.display = 'block'
    })
   }catch(error){ console.log(error); document.getElementById('btn').style.display = 'block'}


            
            
            } else {
                document.getElementById('btn').style.display = 'block'
               alert('Enter Code')
            }
    })
 </script>
</body>
</html>
